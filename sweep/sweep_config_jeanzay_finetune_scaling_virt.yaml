# Finetune-scaling sweep — fine-tune the best full-data pretrained model onto the
# eeuu/eett virtual corrections (absolute AND virt/born ratio form).
#
# Pretrained model: pretrain_full_nh8/trial_0271  (best of both pretraining sweeps,
#   val_loss=1.48e-7; nh=8). The fine-tune model MUST use the same architecture
#   (num_blocks=8, num_heads=8) to load those weights.
#
# One independent DyHPO cell per (dataset x t_steps): a full finetune scaling scan,
# with two extra low-compute points (13, 40) added to densify where finetuning
# converges fastest. t_steps = 10^[0,0.5,1,1.5,2,2.5,3] epochs at 100k/BS16384.
# The matched-architecture solo baseline is provided separately by a single nh=8
# from-scratch cell at t=126 (sweep_config_jeanzay_solo_nh8_anchor_virt.yaml): one
# nh=8 solo point + the shared nh=4 slope gives the nh=8 solo line to compare against.
#
# Generate:  python sweep/generate_scaling_sweep.py --config sweep/sweep_config_jeanzay_finetune_scaling_virt.yaml
# Submit:    python sweep/sweep_manager.py submit <cell dirs it prints>
# Fit:       python sweep/fit_scaling_law.py --config sweeps/finetune_scaling_virt/sweep_config.yaml

cluster:
  scheduler: slurm
  auto_submit: true          # generate -> submit cells interleaved via sweep_manager
  partition: gpu_p2
  account: itg@v100
  request_gpus: 1
  cpus_per_task: 8
  time: "01:00:00"            # covers the largest cell (t=4000)

paths:
  sweep_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/sweeps
  project_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes
  setup_commands:
    - "module load anaconda-py3/2023.09"
    - "conda activate /lustre/fswork/projects/rech/itg/ulm49ia/conda/envs/foundational"
    - "export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True"

sweep_name: finetune_scaling_virt
seed: 42

datasets:
  - ee_uu_nlo_virt_e4         # eeuu virtual correction (absolute)
  - ee_ttbar_nlo_virt_e4      # eett virtual correction (absolute)
  - ee_uu_nlo_virt_ratio      # eeuu virt/born ratio
  - ee_ttbar_nlo_virt_ratio   # eett virt/born ratio

t_steps_values: [4, 13, 40, 126, 400, 1265, 4000]

n_trials_per_level: 15

dyhpo:
  n_candidates: 200
  seed: 42
  n_startup: 4

fixed_params:
  data.data_path: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/data/
  data.subsample: 100000
  data.train_test_val: "[0.7, 0.2, 0.1]"
  model: lloca
  model.net.num_blocks: 8
  model.net.num_heads: 8                  # MUST match the pretrained model (nh=8)
  fine_tune.pretrained_path: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/runs/pretrain_full_nh8/trial_0271/models/model_run0_best.pt.gz
  training.lr: 0.001081750557879577        # nh8 best base LR; fine_tune.lr_scale sweeps on top
  training.batchsize: 16384
  evaluation.batchsize: 8192
  training.es_load_best_model: 'false'
  training.get_ID: 'false'
  training.regularization: L2
  training.save_intermediate: 'false'
  training.scheduler: CosineAnnealingLR
  training.loss_aggregation: geometric_mean
  training.validate_frac: 0.01
  plot: 'true'
  seed: 42

# Finetune search space (varies lr_scale/layer_decay on top of the fixed base LR),
# matching the existing finetune_scaling_* sweeps.
search_space:
  - name: fine_tune.lr_scale
    type: float_log
    low: 0.005
    high: 1.0
  - name: fine_tune.layer_decay
    type: float_uniform
    low: 0.65
    high: 1.0
  - name: training.regularization_lambda
    type: float_log
    low: 1.0e-11
    high: 1.0e-06
  - name: training.cosanneal_warmup_frac
    type: float_uniform
    low: 0.0
    high: 0.2
  - name: training.cosanneal_eta_min
    type: float_log
    low: 1.0e-11
    high: 1.0e-06
