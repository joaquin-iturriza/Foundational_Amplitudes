cluster:
  account: itg@v100
  auto_submit: false
  cpus_per_task: 8
  partition: gpu_p2
  request_gpus: 1
  scheduler: slurm
  time: "02:00:00"
dyhpo:
  n_candidates: 300
  n_startup: 8
  seed: 42
  total_budget: 10000
fidelity_schedule:
  # Equal training COMPUTE to LLoCa's 15000-step pretrain25 run: L-GATr-slim
  # measured 7.429e10 FLOP/step vs LLoCa 4.878e10 (1.52x) in one shared profiling
  # run (batchsize 1024). Matching total FLOPs: 15000 * 4.878e10 / 7.429e10 = 9850.
  # (More steps than the equal-wall-time 8184: slim is FLOP-light but wall-heavy --
  # 1.52x FLOPs yet 1.83x wall time, i.e. lower V100 utilisation than LLoCa.)
  t_steps:
  - 9850
fixed_params:
  # --- identical 25-process recipe data to pretrain25 (the LLoCa baseline) ---
  data.source: recipes
  data.processes_file: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/recipes/pretrain25.yaml
  data.preprocess_per_dataset: 'true'
  data.require_cache: 'true'
  # 500k/process (12.5M pool): identical to the LLoCa pretrain25 baseline, so every
  # architecture sees the same data pool and the comparison's only controlled axis is
  # t_steps. At equal compute slim sees ~10.1M samples (9850 x 1024) < 12.5M, i.e. no
  # repetition. val/test come from the separate frozen eval pool (eval_subsample 20k
  # below), so this knob does not affect the comparison metric.
  data.train_subsample: 500000
  data.eval_subsample: 20000
  data.seed: 42
  data.data_path: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/data/
  # --- model: L-GATr-slim muP, ~1.57M params (matched to LLoCa's 1.61M) ---
  model: lgatr_slim
  model.net.num_blocks: 8
  model.net.num_heads: 2            # fixed structure (muP width axis = hidden channels)
  model.net.hidden_v_channels: 52
  model.net.hidden_s_channels: 104
  evaluation.batchsize: 8192
  plot: 'true'
  seed: 42
  training.batchsize: 1024
  training.get_ID: 'false'
  training.loss_aggregation: geometric_mean
  training.regularization: L2
  training.save_intermediate: 'false'
  training.scheduler: CosineAnnealingLR
  # 0.1 (not pretrain25's 0.02): geometric forward is ~5.6x slower; ~10 validations
  # still tracks the best checkpoint without dominating walltime.
  training.validate_frac: 0.1
n_trials: 20
paths:
  project_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes
  setup_commands:
  - module load anaconda-py3/2023.09
  - conda activate /lustre/fswork/projects/rech/itg/ulm49ia/conda/envs/foundational
  sweep_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/sweeps/pretrain25_slim_eqc
range_extension:
  enabled: false
search_space:
- {name: training.lr,                     type: float_log,     low: 5.0e-4, high: 1.0e-2}
- {name: training.regularization_lambda,  type: float_log,     low: 1.0e-11, high: 1.0e-6}
- {name: training.cosanneal_warmup_frac,  type: float_uniform, low: 0.0,    high: 0.2}
- {name: training.cosanneal_eta_min,      type: float_log,     low: 1.0e-11, high: 1.0e-6}
- {name: training.ema_decay,              type: float_uniform, low: 0.9,    high: 0.9999}
- {name: training.sampler_alpha_ema,      type: float_uniform, low: 0.3,    high: 0.95}
- {name: training.sampler_min_alpha_frac, type: float_uniform, low: 0.05,   high: 0.5}
sweep_name: pretrain25_slim_eqc
