cluster:
  auto_submit: false
  gpus_minimum_memory: 20000
  job_flavour: tomorrow
  request_gpus: 1
  requirements: '!regexp("MIG", TARGET.GPUs_DeviceName)'
  priority: null           # HTCondor job priority — higher = runs first. null = default.
  request_memory: 8000    # MB of RAM to request per job (default cgroup limit is 3000 — raise if OOM).

paths:
  afs_sweep_dir: /afs/cern.ch/user/j/joiturri/Foundational_Amplitudes/sweeps
  eos_sweep_dir: /eos/user/j/joiturri/Foundational_Amplitudes/sweeps
  project_dir: /eos/user/j/joiturri/Foundational_Amplitudes
  python_env: /eos/user/j/joiturri/jitu/amplitude_DSI/amplitudes_env/bin/activate

sweep_name: my_sweep_name
n_trials: 40

dyhpo:
  n_candidates: 300   # HP configurations pre-sampled at sweep init (fixed for the sweep lifetime)
  seed: 42
  n_startup: 10       # random evaluations before the surrogate activates (like n_startup_trials in Optuna)
  total_budget: 10000 # internal DyHPO budget counter — generous upper bound

# Fidelity: training steps only. Full dataset is always used.
# The last entry is treated as full-fidelity.
fidelity_schedule:
  t_steps: [1000, 10000, 40000]

fixed_params:
  data.data_path: /eos/user/j/joiturri/Foundational_Amplitudes/data/
  data.dataset: '[ee_uu_91GeV_amplitudes]'
  model: lloca
  plot: 'true'
  training.batchsize: 512
  training.get_ID: 'false'
  training.regularization: L2
  training.save_intermediate: 'false'
  training.scheduler: CosineAnnealingLR

# HP search space — same format as before.
# DyHPOSampler pre-samples n_candidates configs from this space at init.
search_space:
- name: training.lr
  type: float_log
  low: 1.0e-06
  high: 0.01
- name: training.regularization_lambda
  type: float_log
  low: 1.0e-11
  high: 1.0e-06
- name: training.cosanneal_warmup_frac
  type: float_uniform
  low: 0.0
  high: 0.2
- name: training.cosanneal_eta_min
  type: float_log
  low: 1.0e-11
  high: 1.0e-06
