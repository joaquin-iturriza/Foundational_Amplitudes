# Finetune-scaling sweep — LoRA finetuning of the best pretrained model onto the
# eeuu/eett virtual corrections (absolute AND virt/born ratio).
#
# Same setup as sweep_config_jeanzay_finetune_scaling_virt.yaml (nh=8 pretrained
# trial_0271, 4 datasets, t_steps grid, 100k/BS16384) EXCEPT the finetune method:
# LoRA (fine_tune.lora.enabled=true). inject_lora freezes all non-LoRA params and
# trains only the low-rank adapters in the attention qkv/out projections, so the
# swept HPs are the LoRA ones (rank, alpha) + lr_scale (LoRA-param LR multiplier).
# Directly comparable (FLOPs axis) to the standard and EWC finetune scaling laws.
#
# Generate:  python sweep/generate_scaling_sweep.py --config sweep/sweep_config_jeanzay_finetune_lora_scaling_virt.yaml
# Fit:       python sweep/fit_scaling_law.py --config sweeps/finetune_lora_scaling_virt/sweep_config.yaml \
#              --compare-anchor sweeps/scaling_solo_nh8_anchor_virt_002/sweep_config.yaml \
#              --compare-slope  sweeps/scaling_solo_full/sweep_config.yaml

cluster:
  scheduler: slurm
  auto_submit: true          # generate -> submit (run generate ONCE; re-running bumps to _002)
  partition: gpu_p2
  account: itg@v100
  request_gpus: 1
  cpus_per_task: 8
  time: "01:00:00"

paths:
  sweep_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/sweeps
  project_dir: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes
  setup_commands:
    - "module load anaconda-py3/2023.09"
    - "conda activate /lustre/fswork/projects/rech/itg/ulm49ia/conda/envs/foundational"
    - "export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True"

sweep_name: finetune_lora_scaling_virt
seed: 42

datasets:
  - ee_uu_nlo_virt_e4
  - ee_ttbar_nlo_virt_e4
  - ee_uu_nlo_virt_ratio
  - ee_ttbar_nlo_virt_ratio

t_steps_values: [4, 40, 400, 4000]

n_trials_per_level: 15

dyhpo:
  n_candidates: 200
  seed: 42
  n_startup: 4

fixed_params:
  data.data_path: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/data/
  data.subsample: 100000
  data.train_test_val: "[0.7, 0.2, 0.1]"
  model: lloca
  model.net.num_blocks: 8
  model.net.num_heads: 8
  fine_tune.pretrained_path: /lustre/fswork/projects/rech/itg/ulm49ia/Foundational_Amplitudes/runs/pretrain_full_nh8/trial_0271/models/model_run0_best.pt.gz
  fine_tune.lora.enabled: 'true'
  training.lr: 0.001081750557879577
  training.batchsize: 16384
  evaluation.batchsize: 8192
  training.es_load_best_model: 'false'
  training.get_ID: 'false'
  training.regularization: L2
  training.save_intermediate: 'false'
  training.scheduler: CosineAnnealingLR
  training.loss_aggregation: geometric_mean
  training.validate_frac: 0.01
  plot: 'true'
  seed: 42

# LoRA search space: rank + alpha are the LoRA-specific HPs; lr_scale multiplies the
# base LR for the (only trainable) adapter params. layer_decay is irrelevant with
# LoRA (non-adapter params frozen), so it's left at its default.
search_space:
  - name: fine_tune.lr_scale
    type: float_log
    low: 0.005
    high: 1.0
  - name: fine_tune.lora.rank
    type: int_log
    low: 2
    high: 64
  - name: fine_tune.lora.alpha
    type: float_log
    low: 2.0
    high: 64.0
  - name: training.regularization_lambda
    type: float_log
    low: 1.0e-11
    high: 1.0e-06
  - name: training.cosanneal_warmup_frac
    type: float_uniform
    low: 0.0
    high: 0.2
  - name: training.cosanneal_eta_min
    type: float_log
    low: 1.0e-11
    high: 1.0e-06
