# Zero-shot encoding A/B (PID vs physics) foundation set: same 25 LO processes
# and sqrts ranges as pretrain25.yaml, reduced to 20k/2k/2k per process so the
# full pool regenerates quickly (CPU prepost) and short sweeps train fast. Used
# to train a matched physics(use_PIDs=false) vs PID(use_PIDs=true) pair, then
# zero-shot-eval both on held-out ee_uu and ee_ttbar. Excludes ee_uu/ee_ttbar.
processes:
  # QED photons
  - {name: ee_aa,        sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_aaa,       sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_aaaa,      sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  # leptons
  - {name: ee_mumu,      sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_tautau,    sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_mumua,     sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_tautaua,   sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_mumumumu,  sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_bhabha,    sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_nnbar,     sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  # quarks + QCD radiation
  - {name: ee_ddbar,     sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_bbbar,     sqrts: [20,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_uug,       sqrts: [91,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_uugg,      sqrts: [91,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_uuggg,     sqrts: [91,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_ddbarg,    sqrts: [10,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_bbbarg,    sqrts: [20,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  # electroweak di/tri-boson + Higgs
  - {name: ee_WW,        sqrts: [162, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_ZZ,        sqrts: [185, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_Za,        sqrts: [95,  1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_ZH,        sqrts: [220, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_WWa,       sqrts: [165, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_wwz,       sqrts: [255, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_ZZa,       sqrts: [185, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
  - {name: ee_ZZZ,       sqrts: [280, 1000], n_train: 20_000, n_val: 2_000, n_test: 2_000}
