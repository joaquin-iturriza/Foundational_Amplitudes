# Held-out zero-shot eval targets, generated by the SAME recipe pipeline as the
# pretrain25_zs training set (identical per_event_alphas convention, so the
# frozen model sees inputs/targets in its training distribution — no convention
# confound; CLAUDE.md A/B rule #6). NEVER used for training.
#   ee_uu  [10,1000] : pure flavor swap of the trained ee_ddbar [10,1000]
#                      (only up-vs-down quark differs). Tests fine generalization.
#   ee_ttbar [346,1000] : top quark NEVER seen in training. The physics encoding
#                      maps top -> property vector (heavy charge-2/3 quark); the
#                      PID one-hot encoding has no token for top (un-encodable).
# Only the test pool is consumed by tools/zero_shot_eval.py; train/val kept small.
processes:
  - {name: ee_uu,    sqrts: [10,  1000], n_train: 2000, n_val: 2000, n_test: 20000}
  - {name: ee_ttbar, sqrts: [346, 1000], n_train: 2000, n_val: 2000, n_test: 20000}
