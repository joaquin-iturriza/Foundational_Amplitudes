exp_type: amplitudes
exp_name: amp

data:
 dataset : ["ee_uu_91GeV_amplitudes","ee_aa_13000GeV_amplitudes","ee_aaa_13000GeV_amplitudes"]
 data_path : data/
 subsample : null
 include_permsym: true
 train_test_val: [.4, .5, .1]
 no_props: false
 trafos: []
 amp_trafos:
  - log
  - standardization
 incl_fvs: false

train: true
training:
 iterations: 2500000 # MLP, DSI: 2500000; Tr: 1000000; GAP, GATr, CGENN: 250000
 optimizer: AdamW
 lr: 1e-4
 batchsize: 512
 validate_every_n_steps: 100
 clip_grad_norm: 1000
 scheduler: CosineAnnealingLR

plot: true
plotting:
 histograms: true
 delta: true
 delta_prepd: true

defaults:
 - _self_
 - model: lloca
 - default
 - local: none   # override with `local=desktop` on your Windows machine