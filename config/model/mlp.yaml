_target_: wrappers.AmplitudeMLPWrapper


net:
  _target_: models.mlp.MLP

  n_features: 0 # will be overwritten once the data is loaded and transformed
  hidden_channels: 128
  hidden_layers: 5
  out_shape: 1
  loss: "MSE"
  gain: 1.5 # scaling factor for the initialization of the weights
  init_bias: true

  activation: "gelu"
  num_groups: 1
