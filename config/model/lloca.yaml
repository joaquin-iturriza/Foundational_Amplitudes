_target_: wrappers.AmplitudeLLoCaWrapper

token_size: 0
d_particle_hidden: 16  # fixed projection dim: encoder(n_features → d_particle_hidden).
                        # in_channels = d_particle_hidden + 4 is constant regardless of
                        # how many quantum numbers are in PARTICLE_PROPERTIES, so adding
                        # a 9th feature never requires retraining the transformer.
particle_encoder_hidden: 32  # >0 → 2-layer MLP encoder (Linear→GELU→Linear) instead of a
                             # single Linear, so it can form nonlinear products of quantum
                             # numbers. 0 = legacy single Linear.

# --- Feynman-diagram conditioning (arXiv:2606.23791 graph route) ---------------
# Off by default → in_channels unchanged, model byte-identical to a non-diagram run.
# When on (use_PIDs must be false), a graph encoder embeds each process's diagram
# set into a d_diag vector E(process), broadcast to every particle and concatenated
# into the scalar features exactly like the coupling-order labels (equivariant: E is
# a Lorentz scalar). Needs data/diagrams/<process>.diagrams.json (tools/dump_diagrams.py).
use_diagrams: false
use_diagram_virtuality: false  # Tier B: feed per-event propagator virtuality s=(Σp)² on
                               # internal edges (requires use_diagrams). The pole structure
                               # 1/(s-m²); per-event, so slower than the static topology embed.
virt_log_scale: 0.1            # signed-log(s) is scaled by this before the encoder edge bias
d_diag: 32                   # width of E appended to n_scalars (and num_scalars)
diagrams_dir: data/diagrams  # where the <process>.diagrams.json sidecars live
diagram_encoder:             # graph-transformer hyperparameters (standard-param, off muP axis)
  d_model: 64
  n_heads: 4
  n_layers: 3
  k_pe: 8                     # Laplacian positional-encoding dimension
  max_diagrams: 512          # cap per process (high-multiplicity guard, e.g. qqbar_Zgggg)
net:
  _target_: models.lloca.LLOCAMuPTransformer

  num_scalars: null
  hidden_channels_mlp: 128
  num_layers_mlp: 2

  in_channels: null
  attn_reps: "8x0n+2x1n"
  out_channels: 1
  num_blocks: 8
  num_heads: 8
  freeze_framesnet: false
  checkpoint_blocks: false   # gradient-checkpoint transformer blocks: recompute block
                             # activations in backward instead of storing them — large
                             # activation-memory saving for ~one extra forward of compute.


  loss: "MSE"